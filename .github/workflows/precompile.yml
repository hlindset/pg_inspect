name: Precompile Zigler NIFs

on:
  push:
    tags:
      - "v*.*.*"
      - "precompile-test"

permissions:
  contents: write

jobs:
  precompile:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
      - name: Set up Elixir
        uses: erlef/setup-beam@5304e04ea2b355f03681464e683d92e3b2f18451 # v1
        with:
          elixir-version: "1.19.5"
          otp-version: "28.4"
      - name: Restore dependencies cache
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Install dependencies
        run: mix deps.get
      - name: Install Zig toolchain
        run: mix zig.get
      - name: Run tests
        run: MIX_ENV=test mix test
      - name: Build precompiled Zigler artifacts
        run: MIX_ENV=prod mix zig.precompile lib/pg_inspect/native/binding.ex
      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: |
            lib/pg_inspect/native/lib/*
