name: Precompile Zigler NIFs

on:
  push:
    tags:
      - "v*.*.*"
      - "precompile-test"

permissions:
  contents: write

jobs:
  precompile:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          install_args: --env ci
      - name: Print toolchain and system info
        shell: bash
        run: |
          elixir --version
          zig version
          uname -a
      - name: Install crash diagnostics tools
        run: |
          sudo apt-get update
          sudo apt-get install -y gdb
      - name: Restore dependencies cache
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Install dependencies
        run: mix deps.get
      - name: Run tests
        shell: bash
        run: |
          set -uo pipefail
          sudo sysctl -w kernel.core_pattern="$PWD/core.%e.%p"
          ulimit -c unlimited
          export ERL_CRASH_DUMP="$PWD/erl_crash.test.dump"

          set +e
          MIX_ENV=test mix test
          status=$?
          set -e

          if [ "$status" -eq 139 ]; then
            echo "mix test exited with SIGSEGV"

            if [ -f "$ERL_CRASH_DUMP" ]; then
              echo "== erl_crash.dump =="
              sed -n '1,240p' "$ERL_CRASH_DUMP" || true
            fi

            beam_smp="$(find "$(dirname "$(dirname "$(readlink -f "$(command -v erl)")")")" -path '*/erts-*/bin/beam.smp' -print -quit)"

            if compgen -G "$PWD/core.*" > /dev/null; then
              ls -lah "$PWD"/core.*

              if [ -n "$beam_smp" ]; then
                for core in "$PWD"/core.*; do
                  echo "== gdb backtrace for ${core} =="
                  gdb -batch -q "$beam_smp" "$core" \
                    -ex 'set pagination off' \
                    -ex 'thread apply all bt full' || true
                done
              fi
            fi
          fi

          exit "$status"
      - name: Build precompiled Zigler artifacts
        # `mix precompile.build` mirrors the pg_inspect-supported target matrix
        # and writes the release assets to `lib/.../lib/`.
        shell: bash
        run: |
          set -uo pipefail
          sudo sysctl -w kernel.core_pattern="$PWD/core.%e.%p"
          ulimit -c unlimited
          export ERL_CRASH_DUMP="$PWD/erl_crash.precompile.dump"

          set +e
          MIX_ENV=prod mix precompile.build
          status=$?
          set -e

          if [ "$status" -eq 139 ]; then
            echo "mix precompile.build exited with SIGSEGV"

            if [ -f "$ERL_CRASH_DUMP" ]; then
              echo "== erl_crash.dump =="
              sed -n '1,240p' "$ERL_CRASH_DUMP" || true
            fi

            beam_smp="$(find "$(dirname "$(dirname "$(readlink -f "$(command -v erl)")")")" -path '*/erts-*/bin/beam.smp' -print -quit)"

            if compgen -G "$PWD/core.*" > /dev/null; then
              ls -lah "$PWD"/core.*

              if [ -n "$beam_smp" ]; then
                for core in "$PWD"/core.*; do
                  echo "== gdb backtrace for ${core} =="
                  gdb -batch -q "$beam_smp" "$core" \
                    -ex 'set pagination off' \
                    -ex 'thread apply all bt full' || true
                done
              fi
            fi
          fi

          exit "$status"
      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: |
            lib/pg_inspect/native/lib/*
