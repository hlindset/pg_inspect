name: Precompile Zigler NIFs

on:
  push:
    tags:
      - "v*.*.*"
      - "precompile-test"

permissions:
  contents: write

jobs:
  precompile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install toolchain with mise
        uses: jdx/mise-action@5228313ee0372e111a38da051671ca30fc5a96db
        with:
          install_args: --env ci zig elixir erlang
      - name: Restore dependencies cache
        uses: actions/cache@v3
        with:
          path: deps
          key: ${{ runner.os }}-mix-${{ hashFiles('**/mix.lock') }}
          restore-keys: ${{ runner.os }}-mix-
      - name: Install dependencies
        run: mix deps.get
      - name: Run tests
        run: MIX_ENV=test mix test
      - name: Build precompiled Zigler artifacts
        run: MIX_ENV=prod mix zig.precompile lib/pg_inspect/native/binding.ex
      - uses: softprops/action-gh-release@v1
        if: startsWith(github.ref, 'refs/tags/')
        with:
          draft: true
          files: |
            lib/pg_inspect/native/lib/*
